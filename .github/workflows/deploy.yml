name: Deploy a GitHub Pages

on:
  push:
    # El entorno github-pages solo acepta despliegues desde la rama por
    # defecto del repositorio; se incluye la rama de trabajo (actual rama
    # por defecto) además de main para que cada iteración se publique sola.
    branches:
      - main
      - claude/doom-mobile-game-plan-ls4iuw
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
